<!doctype html>
<html lang="en">
    <head>
        <title>Sailboat Tracker</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="stylesheet" href="http://localhost:8000/leaflet.css" />
        <script
            type="text/javascript"
            src="http://localhost:8000/leaflet.js"
        ></script>
        <script
            type="text/javascript"
            src="http://localhost:8000/leaflet.rotatedMarker.js"
        ></script>
        <style>
            #map {
                position: absolute;
                top: 0;
                bottom: 0;
                left: 0;
                right: 0;
            }
        </style>
    </head>

    <body>
        <div id="map"></div>
        <script type="text/javascript">
            class map_interface {
                static map_options = {
                    center: [0, 0],
                    zoom: 13,
                    enableHighAccuracy: true
                };

                static icon_cache = new Map();

                static assets_url = "http://localhost:8000/";
                static buoy_color = "orange";
                static waypoint_color = "blue";
                static focused_waypoint_color = "violet";

                /**
                 * Returns a cached icon of the specified color.
                 * @param {string} color
                 * @return {L.Icon}
                 */
                static get_icon(color) {
                    const key = `marker-${color}`;
                    if (!this.icon_cache.has(key)) {
                        this.icon_cache.set(
                            key,
                            L.icon({
                                iconUrl:
                                    this.assets_url +
                                    `marker-icon-${color}.png`,
                                shadowUrl:
                                    this.assets_url + "marker-shadow.png",
                                iconSize: [25, 41],
                                iconAnchor: [12, 41],
                                shadowSize: [41, 41]
                            })
                        );
                    }
                    return this.icon_cache.get(key);
                }

                /**
                 * Returns a boat icon scaled by the specified factor.
                 * @param {number} scale
                 * @return {L.Icon}
                 */
                static get_boat_icon(scale = 1) {
                    return L.icon({
                        iconUrl: this.assets_url + "boat.png",
                        iconSize: [50 * scale, 50 * scale],
                        iconAnchor: [25 * scale, 25 * scale]
                    });
                }

                constructor() {
                    this.lastFocusedTimeStamp = performance.now();
                    this.waypoints = [];
                    this.buoys = [];
                    this.boat = { heading: 0, location: [0, 0] };

                    this.min_zoom = 5;
                    this.max_zoom = 20;
                    this.map = L.map("map", map_interface.map_options);

                    this.waypoint_markers = new Map();
                    this.buoy_markers = new Map();
                    this.focused_waypoint = null;
                    this.last_focused_color = map_interface.waypoint_color;

                    const key = "M9yBkV9J49pYUg5o8SGC";
                    L.tileLayer(
                        `https://api.maptiler.com/maps/openstreetmap/{z}/{x}/{y}.jpg?key=${key}`,
                        {
                            minZoom: this.min_zoom,
                            maxZoom: this.max_zoom,
                            tileSize: 512,
                            zoomOffset: -1,
                            attribution:
                                '\u003ca href="https://www.maptiler.com/copyright/" target="_blank"\u003e\u0026copy; MapTiler\u003c/a\u003e \u003ca href="https://www.openstreetmap.org/copyright" target="_blank"\u003e\u0026copy; OpenStreetMap contributors\u003c/a\u003e',
                            crossOrigin: true
                        }
                    ).addTo(this.map);

                    L.control.scale().addTo(this.map);

                    let move_timeout;
                    this.map.on("move", () => {
                        clearTimeout(move_timeout);
                        move_timeout = setTimeout(
                            () => this.handle_map_move(),
                            100
                        );
                    });

                    this.map.on("click", e => {
                        this.add_waypoint(e.latlng.lat, e.latlng.lng);
                    });

                    this.map.on("contextmenu", e => {
                        this.handle_right_click(e);
                    });

                    this.boat_marker = L.marker(this.boat.location, {
                        icon: map_interface.get_boat_icon(),
                        rotationAngle: this.boat.heading,
                        rotationOrigin: "center"
                    }).addTo(this.map);

                    this.no_sail_svg = null;
                    this.wind_svg = null;
                    this.compass_rose_svg = null;

                    // this.map.on("zoomend", () => {
                    //     const newZoom = this.map.getZoom();
                    //     if (newZoom !== this.currentZoom) {
                    //         this.currentZoom = newZoom;
                    //         this.zoom_icons(newZoom);
                    //     }
                    // });
                }

                /**
                 * Handles map movement to unfocus waypoints after a delay.
                 */
                handle_map_move() {
                    if (!this.focused_waypoint) return;
                    const diff = performance.now() - this.lastFocusedTimeStamp;
                    if (diff > 500) {
                        this.unfocus_waypoint();
                    }
                }

                /**
                 * Handles right-click events to remove the closest waypoint.
                 * @param {Object} e - The event object containing latlng.
                 */
                handle_right_click(e) {
                    let closest_index = -1;
                    let closest_distance = Infinity;
                    this.waypoints.forEach((waypoint, index) => {
                        const distance = Math.sqrt(
                            (waypoint[0] - e.latlng.lat) ** 2 +
                                (waypoint[1] - e.latlng.lng) ** 2
                        );
                        if (distance < closest_distance && distance < 0.05) {
                            closest_index = index;
                            closest_distance = distance;
                        }
                    });
                    if (closest_index !== -1) {
                        this.remove_waypoint(closest_index);
                    }
                }

                // Waypoint Methods

                /**
                 * Synchronizes waypoints with the server.
                 * @return {Promise<void>}
                 */
                async sync_waypoints() {
                    try {
                        const response = await fetch(
                            "http://localhost:3002/waypoints",
                            {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    waypoints: this.waypoints
                                })
                            }
                        );
                        if (!response.ok) {
                            console.error("Failed to sync waypoints");
                        }
                    } catch (error) {
                        console.error("Error syncing waypoint:", error);
                    }
                }

                /**
                 * Adds a waypoint to the map and syncs it with the server.
                 * @param {number} lat
                 * @param {number} lon
                 */
                add_waypoint(lat, lon) {
                    const key = `${lat},${lon}`;
                    if (this.waypoint_markers.has(key)) {
                        console.log("Waypoint already exists.");
                        return;
                    }

                    this.waypoints.push([lat, lon]);
                    const marker = L.marker([lat, lon], {
                        icon: map_interface.get_icon(
                            map_interface.waypoint_color
                        )
                    }).addTo(this.map);
                    this.waypoint_markers.set(key, marker);
                    this.sync_waypoints();
                }

                /**
                 * Removes the waypoint at the specified index.
                 * @param {number} index
                 */
                remove_waypoint(index) {
                    const [lat, lon] = this.waypoints.splice(index, 1)[0];
                    const key = `${lat},${lon}`;
                    const marker = this.waypoint_markers.get(key);
                    if (marker) {
                        this.map.removeLayer(marker);
                        this.waypoint_markers.delete(key);
                    }
                    if (this.focused_waypoint === key) {
                        this.focused_waypoint = null;
                    }
                    this.sync_waypoints();
                }

                /**
                 * Changes the color of all waypoints on the map.
                 * @param {string} color
                 */
                change_color_waypoints(color) {
                    this.waypoint_markers.forEach(marker => {
                        marker.setIcon(map_interface.get_icon(color));
                    });
                }

                /**
                 * Clears all waypoints from the map.
                 */
                clear_waypoints() {
                    this.waypoint_markers.forEach(marker => {
                        this.map.removeLayer(marker);
                    });
                    this.waypoint_markers.clear();
                    this.waypoints = [];
                    this.focused_waypoint = null;
                    this.sync_waypoints();
                }

                /**
                 * Unfocuses the currently focused waypoint.
                 */
                unfocus_waypoint() {
                    if (this.focused_waypoint) {
                        const marker = this.waypoint_markers.get(
                            this.focused_waypoint
                        );
                        if (marker) {
                            marker.setIcon(
                                map_interface.get_icon(this.last_focused_color)
                            );
                        }
                        this.focused_waypoint = null;
                    }
                }

                // Buoy Methods

                /**
                 * Adds a buoy to the map.
                 * @param {number} lat
                 * @param {number} lon
                 */
                add_buoy(lat, lon) {
                    const key = `${lat},${lon}`;
                    this.buoys.push([lat, lon]);
                    const marker = L.marker([lat, lon], {
                        icon: map_interface.get_icon(map_interface.buoy_color)
                    }).addTo(this.map);
                    this.buoy_markers.set(key, marker);
                }

                /**
                 * Removes the buoy at the specified index.
                 * @param {number} index
                 */
                remove_buoy(index) {
                    const [lat, lon] = this.buoys.splice(index, 1)[0];
                    const key = `${lat},${lon}`;
                    const marker = this.buoy_markers.get(key);
                    if (marker) {
                        this.map.removeLayer(marker);
                        this.buoy_markers.delete(key);
                    }
                }

                /**
                 * Clears all buoys from the map.
                 */
                clear_buoys() {
                    this.buoy_markers.forEach(marker => {
                        this.map.removeLayer(marker);
                    });
                    this.buoy_markers.clear();
                    this.buoys = [];
                }

                // Boat Methods

                /**
                 * Focuses the map on the boat.
                 */
                focus_map_on_boat() {
                    this.map.setView(this.boat.location, this.map.getMaxZoom());
                }

                /**
                 * Updates the boat's location on the map.
                 * @param {number} lat
                 * @param {number} lon
                 */
                update_boat_location(lat, lon) {
                    this.boat.location = [lat, lon];
                    this.boat_marker.setLatLng(this.boat.location);
                }

                /**
                 * Updates the boat's heading on the map.
                 * @param {number} heading
                 */
                update_boat_heading(heading) {
                    this.boat.heading = heading;
                    this.boat_marker.setRotationAngle(90 - heading);
                }

                /**
                 * Updates both location and heading.
                 * @param {number} lat
                 * @param {number} lon
                 * @param {number} heading
                 */
                update_boat_location_and_heading(lat, lon, heading) {
                    this.update_boat_location(lat, lon);
                    this.update_boat_heading(heading);
                }

                // SVG Methods

                /**
                 * Removes the no_sail svg. This is needed so it can be turned off!
                 */
                remove_debug_svgs() {
                    if (this.no_sail_svg != null) {
                        this.no_sail_svg.remove();
                    }
                    if (this.compass_rose_svg != null) {
                        this.compass_rose_svg.remove();
                    }
                    if (this.wind_svg != null) {
                        this.wind_svg.remove();
                    }
                }

                /**
                 * Updates the no_sail svg.
                 * @param {string} innerHTML
                 * @param {number} size
                 */
                update_no_sail_svg(innerHTML, size) {
                    if (this.no_sail_svg == null) {
                        var svgElement = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svgElement.setAttribute('xmlns', "http://www.w3.org/2000/svg");
                        svgElement.setAttribute('viewBox', `0 0 4 4`);
                    } else {
                        this.no_sail_svg.remove();
                        var svgElement = this.no_sail_svg.getElement();
                    }
                    svgElement.innerHTML = innerHTML;
                    const bounds = this.map.getBounds();
                    const width = (bounds.getEast()-bounds.getWest())/2*size;
                    const height = (bounds.getSouth()-bounds.getNorth())/2*size;
                    const svgElementBounds = [[this.boat.location[0]+width, this.boat.location[1]+height],
                                              [this.boat.location[0]-width, this.boat.location[1]-height]];
                    this.no_sail_svg = L.svgOverlay(svgElement, svgElementBounds).addTo(this.map);
                }

                /**
                 * Updates the wind compass svg.
                 * @param {string} wind_HTML
                 * @param {number} size
                 */
                update_wind_svg(wind_HTML, size) {
                    const bounds = this.map.getBounds();
                    const lon1 = 39/40*bounds.getWest()+1/40*bounds.getEast();
                    const lat1 = 37/40*bounds.getSouth()+3/40*bounds.getNorth();
                    const lon2 = 35/40*bounds.getWest()+5/40*bounds.getEast();
                    const lat2 = 33/40*bounds.getSouth()+7/40*bounds.getNorth();
                    const svgElementBounds = [[lat1, lon1], [lat2, lon2]];

                    if (this.compass_rose_svg == null) {
                        svgElement = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svgElement.setAttribute('xmlns', "http://www.w3.org/2000/svg");
                        svgElement.setAttribute('viewBox', `0 0 100 100`);
                        svgElement.innerHTML = '<path d="M49.956 10c-.591-.003-.916.4-1.007.872l-2.443 8.242a30.937 30.937 0 0 0-15.897 6.6c-2.538-1.378-5.075-2.763-7.615-4.133c-.47-.253-.882-.234-1.262.149c-.381.383-.273.947-.058 1.353l4.069 7.495a30.931 30.931 0 0 0-6.634 15.932c-2.774.823-5.552 1.639-8.323 2.467c-.51.153-.787.458-.786.998c.002.54.476.863.916.998l8.189 2.426a30.936 30.936 0 0 0 6.599 15.98c-1.385 2.552-2.778 5.104-4.156 7.658c-.253.47-.234.88.15 1.261c.382.38.946.274 1.352.06l7.537-4.091a30.933 30.933 0 0 0 15.922 6.622c.822 2.775 1.64 5.554 2.468 8.325c.153.51.458.787.998.786c.54-.002.863-.476.998-.916l2.426-8.189a30.89 30.89 0 0 0 16.006-6.632l7.568 4.11c.549.28.92.329 1.34-.087c.421-.416.366-.932.097-1.33l-4.12-7.593a30.962 30.962 0 0 0 6.591-15.958l8.233-2.44c.586-.19.883-.417.886-1.009c.003-.591-.4-.916-.872-1.007l-8.27-2.451a30.967 30.967 0 0 0-6.607-15.91l4.09-7.531c.279-.55.328-.92-.088-1.341a.957.957 0 0 0-.671-.305a1.15 1.15 0 0 0-.659.21l-7.546 4.097a30.883 30.883 0 0 0-15.978-6.62l-2.434-8.212c-.19-.586-.417-.883-1.009-.886zm-.001 4.176v31.04a4.783 4.783 0 0 0-2.306.619l-4.979-6.308l5.214-18.143l.7-2.441zM54.14 21.6a28.54 28.54 0 0 1 12.96 5.355l-9.797 5.318zm-8.377.025l-3.144 10.607c-3.241-1.762-6.484-3.517-9.726-5.278a28.553 28.553 0 0 1 12.87-5.329zM24.65 24.65l15.602 15.57l-.008.023c-1.987.589-3.972 1.18-5.96 1.768l-5.988-10.793l-1.223-2.205zm50.648.018l-3.343 3.344l-1.673 1.672L59.73 40.237l-.075-.022l-1.754-5.916l10.865-6.015l1.308-.722l.89-.494zm-2.278 8.188a28.554 28.554 0 0 1 5.355 12.907l-10.648-3.156zm-46.039.008l5.29 9.744c-3.554 1.05-7.104 2.108-10.657 3.16a28.538 28.538 0 0 1 5.367-12.904zm33.392 9.779l18.242 5.24l2.413.694l4.795 1.378h-31.04a4.783 4.783 0 0 0-.631-2.328zm-15.156 7.312l-.002.045c0 .798.2 1.583.581 2.284L39.5 57.241l-6.241-1.788l-11.88-3.4v-.002l-2.438-.698l-4.813-1.378zm33.184 4.184a28.538 28.538 0 0 1-5.348 12.95l-5.313-9.79zm-56.79.003l10.647 3.155c-1.775 3.265-3.542 6.532-5.316 9.797a28.549 28.549 0 0 1-5.331-12.952zm30.697.047l4.96 6.211l-1.803 6.296L52.05 78.62l-.698 2.439l-1.378 4.813l-.02-31.09c.842.002 1.716-.218 2.354-.593zm13.403 3.71l6.01 10.86l1.218 2.199l2.421 4.374l-3.374-3.375l-1.673-1.672l-10.607-10.607zm-25.475 1.832c.592 2 1.187 3.996 1.778 5.996l-10.786 5.984l-2.207 1.224l-4.405 2.445zm17.074 7.966l9.82 5.333a28.552 28.552 0 0 1-12.989 5.358zm-14.7.042c1.05 3.55 2.106 7.097 3.157 10.646a28.54 28.54 0 0 1-12.894-5.36z" fill="#000000"></path><path d="M46 8V0h1.981l4.127 5.342V0H54v8h-2.043l-4.065-5.217V8z" aria-label="N" letter-spacing="0" fill="#000000"></path><path d="M46 97.347l1.933-.147q.174.764.705 1.123q.536.359 1.443.359q.96 0 1.442-.317q.49-.321.49-.749q0-.274-.208-.464q-.201-.195-.711-.337q-.349-.095-1.59-.338q-1.598-.31-2.242-.764q-.906-.639-.906-1.556q0-.59.423-1.102q.43-.517 1.228-.786q.805-.269 1.94-.269q1.852 0 2.785.638q.94.638.986 1.703l-1.986.069q-.128-.596-.55-.854q-.417-.264-1.256-.264q-.866 0-1.356.28q-.315.179-.315.48q0 .274.295.469q.376.248 1.826.517q1.45.269 2.14.559q.699.284 1.088.785q.396.496.396 1.23q0 .664-.47 1.244t-1.329.865q-.859.279-2.14.279q-1.866 0-2.866-.675q-1-.68-1.195-1.978z" aria-label="S" letter-spacing="0" fill="#000000"></path><path d="M92 54v-8h7.8v1.353h-5.676v1.774h5.28v1.348h-5.28v2.177H100V54z" aria-label="E" letter-spacing="0" fill="#000000"></path><path d="M1.455 54L0 46h1.26l.919 5.495L3.293 46h1.464l1.068 5.588L6.761 46H8l-1.48 8H5.214L4 48.02L2.79 54z" aria-label="W" letter-spacing="0" fill="#000000"></path>';
                    } else {
                        this.compass_rose_svg.remove();
                        var svgElement = this.compass_rose_svg.getElement();
                    }
                    this.compass_rose_svg = L.svgOverlay(svgElement, svgElementBounds).addTo(this.map);

                    if (this.wind_svg == null) {
                        var svgElement = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        svgElement.setAttribute('xmlns', "http://www.w3.org/2000/svg");
                        svgElement.setAttribute('viewBox', `0 0 2 2`);
                    } else {
                        this.wind_svg.remove();
                        var svgElement = this.wind_svg.getElement();
                    }
                    svgElement.innerHTML = wind_HTML;
                    this.wind_svg = L.svgOverlay(svgElement, svgElementBounds).addTo(this.map);
                }

                // Miscellaneous Map Methods

                /**
                 * Focuses the map on a specific marker.
                 * @param {number} lat
                 * @param {number} lon
                 */
                focus_map_on_marker(lat, lon) {
                    const key = `${lat},${lon}`;
                    const marker =
                        this.waypoint_markers.get(key) ||
                        this.buoy_markers.get(key);

                    if (!marker) return;

                    this.lastFocusedTimeStamp = performance.now();
                    this.map.setView([lat, lon], this.map.getZoom());

                    // Change previously focused waypoint back to its original color
                    if (
                        this.focused_waypoint &&
                        this.focused_waypoint !== key
                    ) {
                        const prev_marker = this.waypoint_markers.get(
                            this.focused_waypoint
                        );
                        if (prev_marker) {
                            prev_marker.setIcon(
                                map_interface.get_icon(this.last_focused_color)
                            );
                        }
                    }

                    // Focus on the new waypoint if it exists
                    if (this.waypoint_markers.has(key)) {
                        this.focused_waypoint = key;
                        this.last_focused_color =
                            marker.options.icon.options.iconUrl
                                .split("-")
                                .slice(-1)[0]
                                .replace(".png", "");
                        marker.setIcon(
                            map_interface.get_icon(
                                map_interface.focused_waypoint_color
                            )
                        );
                    }
                }

                /**
                 * Adjusts icon sizes based on zoom level.
                 * @param {number} zoom
                 */
                zoom_icons(zoom) {
                    const scale = Math.pow(
                        2,
                        zoom - map_interface.map_options.zoom
                    );
                    this.boat_marker.setIcon(
                        map_interface.get_boat_icon(scale)
                    );

                    const updateMarker = (marker, isBoat = false) => {
                        const iconUrl = marker.options.icon.options.iconUrl;
                        if (iconUrl.includes("marker-icon") || isBoat) {
                            const newIcon = L.icon({
                                iconUrl: iconUrl,
                                shadowUrl:
                                    map_interface.assets_url +
                                    "marker-shadow.png",
                                iconSize: [25 * scale, 41 * scale],
                                iconAnchor: [12 * scale, 41 * scale],
                                shadowSize: [41 * scale, 41 * scale]
                            });
                            marker.setIcon(newIcon);
                        }
                    };

                    this.waypoint_markers.forEach(marker =>
                        updateMarker(marker)
                    );
                    this.buoy_markers.forEach(marker => updateMarker(marker));
                }
            
            }

            const map = new map_interface();
        </script>
    </body>
</html>
