# NOTE: THIS IS FOR YOLO11
property:
    gpu-id: 0
    net-scale-factor: 0.0039215697906911373
    model-color-format: 0

    # This is the onnx file section.
    # Onnx files are created by running export_yolo11.py
    onnx-file: ./yolo11/onnx_files/chris.onnx
    #onnx-file: ./yolo11/onnx_files/yolo11s.onnx

    # This is the engine file section
    # Engine files are created by running the deepstream pipeline
    model-engine-file: ./yolo11/engine_files/chris_model_b1_gpu0_fp16.engine
    #model-engine-file: ./yolo11/engine_files/yolo11s_model_b1_gpu0_fp16.engine

    # This is the label file section
    # Label files are created by running export_yolo11.py
    labelfile-path: ./yolo11/label_files/chris_labels.txt
    #labelfile-path: ./yolo11/label_files/yolo11s_labels.txt

    #int8-calib-file: calib.table
    batch-size: 1 # This should equal the number of video streams
    network-mode: 2 # 0 for fp32, 1 for int8, 2 for fp16
    num-detected-classes: 80
    interval: 0
    gie-unique-id: 1
    process-mode: 1
    network-type: 0
    cluster-mode: 2
    maintain-aspect-ratio: 1
    symmetric-padding: 1
    #workspace-size: 1000
    parse-bbox-func-name: NvDsInferParseYolo
    #parse-bbox-func-name: NvDsInferParseYoloCuda
    custom-lib-path: ../cv_library/deepstream_yolo_library/libnvdsinfer_custom_impl_Yolo.so
    engine-create-func-name: NvDsInferYoloCudaEngineGet

class-attrs-all:
    pre-cluster-threshold: 0.25
    nms-iou-threshold: 0.45
    topk: 300
