name: ROS2 Cross-Architecture Build & Release

# ============================================================================
# CONFIGURABLE PACKAGES
# Edit the list below to change which packages don't get built and distributed.
# These are passed directly to `colcon build --packages-ignore`.
# ============================================================================
env:
  COLCON_IGNORE_PACKAGES: "foil_dynamics rudder_dynamics sail_limits sailboat_simulation autopilot_transform wind_arrow"

on:
  push:
    branches: [ "main", "cpp" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "cpp" ]

jobs:
  build:
    name: Build (${{ matrix.architecture }})
    
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        architecture: [ amd64, arm64 ]
        include:
          - architecture: amd64
            runner: ubuntu-22.04
            platform: linux/amd64
          - architecture: arm64
            runner: ubuntu-22.04-arm
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        # Only push images to the registry when pushing to the main branch.
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Compute the package version from the git tag (e.g. v1.2.3 → 1.2.3)
      # or fall back to 0.0.0+git<sha> for non-tag builds.
      # The version is passed into the container via an environment variable.
      # -----------------------------------------------------------------------
      - name: Compute package version
        id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.0.0+git$(git rev-parse --short HEAD)"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Package version: ${VERSION}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      # -----------------------------------------------------------------------
      # Build the CI Docker images, cached between runs via GitHub Actions Cache.
      # We build the Base image first, then Micro-ROS on top of it.
      # -----------------------------------------------------------------------
      - name: Build Base Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: ${{ matrix.platform }}
          load: true
          tags: autoboat-base:latest
          cache-from: type=registry,ref=vtautoboat/development_image:${{ matrix.architecture }}

      - name: Build Micro-ROS Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .devcontainer/devcontainer_variants/Dockerfile.microros
          platforms: ${{ matrix.platform }}
          load: true
          build-args: |
            BASE_IMAGE=autoboat-base:latest
          tags: autoboat-microros:latest
          cache-from: type=registry,ref=vtautoboat/development_image_microros:${{ matrix.architecture }}

      # -----------------------------------------------------------------------
      # Run colcon build AND package everything inside the container.
      # All disk work happens inside the container (root) to avoid:
      #   - Cross-filesystem mv failures (/tmp vs bind-mount are diff filesystems)
      #   - Host runner (non-root) being unable to read/tar root-owned build output
      # We pass DEB_VERSION + DEB_ARCH as env vars so the inner shell can use them.
      #
      # Outputs (all chmod'd readable for the host runner to upload):
      #   output_artifacts/autoboat-prebuilt-<arch>.tar.gz  (build/ + install/)
      #   output_artifacts/autoboat-vt-<arch>.deb            (install/ only, with deps)
      # -----------------------------------------------------------------------
      - name: Build ROS2 Packages, Tarball, and Debian Package
        run: |
          docker run --rm \
            --user root \
            -v ${{ github.workspace }}:/home/ws \
            -w /home/ws \
            -e DEB_VERSION="${{ steps.meta.outputs.version }}" \
            -e DEB_ARCH="${{ matrix.architecture }}" \
            autoboat-base:latest \
            bash -c '
              set -e
              source /opt/ros/humble/setup.bash

              # ── 1. Build ────────────────────────────────────────────────────
              echo "==> colcon build ignore: ${{ env.COLCON_IGNORE_PACKAGES }}"
              colcon build --packages-ignore ${{ env.COLCON_IGNORE_PACKAGES }}

              # ── 2. Tarball (build/ + install/) ──────────────────────────────
              echo "==> Creating tarball..."
              mkdir -p output_artifacts
              tar -czf "output_artifacts/autoboat-prebuilt-${DEB_ARCH}.tar.gz" build/ install/

              # ── 3. Debian package (install/ only) ───────────────────────────
              echo "==> Building .deb package (v${DEB_VERSION} ${DEB_ARCH})..."
              PKG_DIR=/home/ws/deb_pkg
              mkdir -p "${PKG_DIR}/DEBIAN"
              mkdir -p "${PKG_DIR}/opt/autoboat"

              # Copy install overlay into package tree
              cp -r install "${PKG_DIR}/opt/autoboat/"

              # Fill in version + arch placeholders in the control file template
              sed -e "s/VERSION_PLACEHOLDER/${DEB_VERSION}/" -e "s/ARCH_PLACEHOLDER/${DEB_ARCH}/" \
                .github/deb/control.template > "${PKG_DIR}/DEBIAN/control"

              # Maintainer scripts
              cp .github/deb/postinst "${PKG_DIR}/DEBIAN/postinst"
              cp .github/deb/prerm    "${PKG_DIR}/DEBIAN/prerm"
              chmod 0755 "${PKG_DIR}/DEBIAN/postinst" "${PKG_DIR}/DEBIAN/prerm"

              dpkg-deb --build "${PKG_DIR}" "output_artifacts/autoboat-vt-${DEB_ARCH}.deb"

              # ── 4. Fix permissions for host runner upload ───────────────────
              echo "==> Fixing permissions for host runner..."
              # Ensure the host runner can read everything in output_artifacts
              chmod -R a+rX output_artifacts/
              
              echo "==> Output artifacts:"
              du -sh output_artifacts/*
            '

      # Upload both the .tar.gz and .deb as workflow artifacts.
      # On every push/PR these are downloadable from the Actions tab for 5 days.
      # On tag pushes the release job picks them up too.
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: autoboat-prebuilt-${{ matrix.architecture }}
          path: output_artifacts/
          retention-days: 5

      # -----------------------------------------------------------------------
      - name: Push Architecture-Specific Dev Images
        if: success() && github.ref == 'refs/heads/main'
        run: |
          # Base image
          TAG_BASE="vtautoboat/development_image:${{ matrix.architecture }}"
          echo "==> Tagging and pushing ${TAG_BASE}..."
          docker tag autoboat-base:latest $TAG_BASE
          docker push $TAG_BASE

          # Micro-ROS variant
          TAG_MICROROS="vtautoboat/development_image_microros:${{ matrix.architecture }}"
          echo "==> Tagging and pushing ${TAG_MICROROS}..."
          docker tag autoboat-microros:latest $TAG_MICROROS
          docker push $TAG_MICROROS

  # ============================================================================
  # Release job — only runs on version tag pushes (v*).
  # Attaches both the .tar.gz and .deb for all architectures to a GitHub Release.
  # To publish: git tag v1.0.0 && git push origin v1.0.0
  # ============================================================================
  release:
    name: Create GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: autoboat-prebuilt-*
          path: output_artifacts
          merge-multiple: true

      - name: List release assets
        run: ls -lh output_artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output_artifacts/autoboat-prebuilt-*.tar.gz
            output_artifacts/autoboat-vt-*.deb
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, '-') }}


  # ============================================================================
  # Publish Multi-Arch Dev Image — runs after successful build.
  # Combines the amd64 and arm64 images into a single multi-arch manifest.
  # ============================================================================
  publish-dev-image:
    name: Publish Multi-Arch Dev Image (${{ matrix.variant }})
    needs: build
    if: success() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [ standard, microros ]
        include:
          - variant: standard
            image_repo: vtautoboat/development_image
          - variant: microros
            image_repo: vtautoboat/development_image_microros
    steps:
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create and Push Multi-Arch Manifest
        run: |
          echo "==> Creating multi-arch manifest for ${{ matrix.image_repo }}:latest..."
          docker buildx imagetools create -t ${{ matrix.image_repo }}:latest ${{ matrix.image_repo }}:amd64 ${{ matrix.image_repo }}:arm64